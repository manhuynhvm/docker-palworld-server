version: "3.8"

services:
    palworld-server:
        image: docker.io/library/palworld-server-shk:latest
        container_name: palworld-server
        hostname: palworld-server
        restart: unless-stopped
        env_file: .env
        ports:
            - "8211:8211/udp" # Game server port
            - "27015:27015/udp" # Steam query port
            - "8212:8212/tcp" # REST API port
            - "9090:9090/tcp" # Prometheus metrics (optional)

        volumes:
            - ./palworld_data:/home/steam/palworld_server/Pal/Saved
            - ./palworld_backups:/home/steam/backups
            - ./palworld_logs:/home/steam/logs
            - /etc/localtime:/etc/localtime:ro

        healthcheck:
            test: ["CMD", "/usr/local/bin/healthcheck"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5m

        deploy:
            resources:
                limits:
                    memory: 8G
                    cpus: "4"
                reservations:
                    memory: 4G
                    cpus: "2"

        logging:
            driver: "json-file"
            options:
                max-size: "50m"
                max-file: "5"

    prometheus:
        image: prom/prometheus:latest
        container_name: palworld-prometheus
        hostname: palworld-prometheus
        restart: unless-stopped
        ports:
            - "9091:9090" # Prometheus UI (mapped to 9091 to avoid conflict)
        volumes:
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./palworld_prometheus:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
        depends_on:
            - palworld-server

    grafana:
        image: grafana/grafana:latest
        container_name: palworld-grafana
        hostname: palworld-grafana
        restart: unless-stopped
        ports:
            - "3000:3000" # Grafana UI
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_INSTALL_PLUGINS=
        volumes:
            - ./docker/grafana/datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
            - ./docker/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/providers.yml:ro
            - ./docker/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/palworld.json:ro
            - ./palworld_grafana:/var/lib/grafana
        depends_on:
            - prometheus
