version: "3.8"

services:
    palworld-server:
        image: peozozo123/palworld-server:latest
        container_name: palworld-server
        hostname: palworld-server
        restart: unless-stopped
        stop_grace_period: 150s
        cap_add:
            - NET_RAW
        environment:
            # Required — must be set via .env or shell environment
            ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Admin password is required in .env or environment}
            SERVER_NAME: ${SERVER_NAME:?Server name is required}
            MAX_PLAYERS: ${MAX_PLAYERS:?MAX_PLAYERS is required}
            SERVER_PORT: ${SERVER_PORT:?SERVER_PORT is required}
            REST_API_PORT: ${REST_API_PORT:?REST_API_PORT is required}
            # Optional
            PUID: ${PUID:-1002}
            PGID: ${PGID:-1002}
            BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
            MONITORING_MODE: ${MONITORING_MODE:-both}
            IDLE_RESTART_ENABLED: ${IDLE_RESTART_ENABLED:-true}
            IDLE_RESTART_MINUTES: ${IDLE_RESTART_MINUTES:-30}
            IDLE_RESTART_MODE: ${IDLE_RESTART_MODE:-restart}
            IDLE_PAUSE_INTERFACE: ${IDLE_PAUSE_INTERFACE:-eth0}
            TARGET_MANIFEST_ID: "${TARGET_MANIFEST_ID:-}"
        ports:
            - "8211:8211/udp" # Game server port
            - "27015:27015/udp" # Steam query port
            - "127.0.0.1:8212:8212/tcp" # REST API port (localhost only)
            - "127.0.0.1:9090:9090/tcp" # Prometheus metrics (localhost only)

        volumes:
            - ./palworld_data:/home/steam/palworld_server/Pal/Saved
            - ./palworld_backups:/home/steam/backups
            - ./palworld_logs:/home/steam/logs
            - /etc/localtime:/etc/localtime:ro

        healthcheck:
            test: ["CMD", "/usr/local/bin/healthcheck"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5m

        deploy:
            resources:
                limits:
                    memory: 8G
                    cpus: "4"
                reservations:
                    memory: 4G
                    cpus: "2"

        logging:
            driver: "json-file"
            options:
                max-size: "50m"
                max-file: "5"

    prometheus:
        image: prom/prometheus:latest
        container_name: palworld-prometheus
        hostname: palworld-prometheus
        restart: unless-stopped
        ports:
            - "127.0.0.1:9091:9090" # Prometheus UI (localhost only)
        volumes:
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./palworld_prometheus:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
        depends_on:
            - palworld-server

    grafana:
        image: grafana/grafana:latest
        container_name: palworld-grafana
        hostname: palworld-grafana
        restart: unless-stopped
        ports:
            - "127.0.0.1:3000:3000" # Grafana UI (localhost only)
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Grafana admin password is required}
            - GF_INSTALL_PLUGINS=
        volumes:
            - ./docker/grafana/datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
            - ./docker/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/providers.yml:ro
            - ./docker/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/palworld.json:ro
            - ./palworld_grafana:/var/lib/grafana
        depends_on:
            - prometheus
