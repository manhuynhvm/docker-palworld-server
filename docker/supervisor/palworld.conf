[supervisord]
nodaemon=true
user=root
logfile=/home/steam/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700
chown=steam:steam

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ============================================================
# Python Manager — Main orchestrator (server_manager.py)
# Handles API, monitoring, idle restart, config, backup scheduling
# If this crashes, supervisor auto-restarts it.
# ============================================================
[program:python-manager]
command=python -m src.server_manager
directory=/app
user=steam
autostart=true
autorestart=true
startretries=3
startsecs=10
stopwaitsecs=150
stdout_logfile=/home/steam/logs/manager.log
stderr_logfile=/home/steam/logs/manager_error.log
stdout_logfile_maxbytes=20MB
stderr_logfile_maxbytes=20MB
stdout_logfile_backups=3
stderr_logfile_backups=3
environment=PYTHONPATH="/app/src",
    PYTHONUNBUFFERED="1",
    USE_PERFORMANCE_THREADS="${USE_PERFORMANCE_THREADS:-true}",
    QUERY_PORT="${QUERY_PORT:-27018}",
    RCON_ENABLED="${RCON_ENABLED:-true}",
    REST_API_ENABLED="${REST_API_ENABLED:-true}",
    LOG_LEVEL="${LOG_LEVEL:-INFO}"
priority=200

# ============================================================
# Metrics Exporter — Prometheus metrics (Phase 2)
# Standalone process so metrics keep running even during restart
# ============================================================
[program:metrics-exporter]
command=python -c "
import asyncio, os, sys
sys.path.insert(0, '/app/src')
from src.monitoring.metrics_collector import get_metrics_collector
from src.config_loader import get_config

async def run():
    config = get_config()
    collector = get_metrics_collector(config)
    await collector.start_collection()
    try:
        while True:
            await asyncio.sleep(60)
    except asyncio.CancelledError:
        await collector.stop_collection()

asyncio.run(run())
"
directory=/app
user=steam
autostart=true
autorestart=true
startretries=3
startsecs=5
stdout_logfile=/home/steam/logs/metrics_exporter.log
stderr_logfile=/home/steam/logs/metrics_exporter_error.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile_backups=2
environment=PYTHONPATH="/app/src",
    PYTHONUNBUFFERED="1",
    MONITORING_MODE="${MONITORING_MODE:-both}",
    LOG_LEVEL="${LOG_LEVEL:-INFO}"
priority=400

# ============================================================
# Health Monitor — Periodic health checks
# ============================================================
[program:health-monitor]
command=python -m src.utils.health_manager
directory=/app
user=steam
autostart=true
autorestart=true
startretries=3
startsecs=5
stdout_logfile=/home/steam/logs/health.log
stderr_logfile=/home/steam/logs/health_error.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile_backups=2
environment=PYTHONPATH="/app/src",
    PYTHONUNBUFFERED="1",
    HEALTH_CHECK_INTERVAL="${HEALTH_CHECK_INTERVAL:-60}",
    HEALTH_CHECK_ENABLED="${HEALTH_CHECK_ENABLED:-true}",
    LOG_LEVEL="${LOG_LEVEL:-INFO}"
priority=300

# ============================================================
# Event listener for stdout forwarding
# ============================================================
[eventlistener:stdout]
command=supervisor_stdout
buffer_size=100
events=PROCESS_LOG
result_handler=supervisor_stdout:event_handler
