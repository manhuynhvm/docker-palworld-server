global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'palworld-server'
    static_configs:
      - targets: ['palworld-server:9090']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'palworld-server'
