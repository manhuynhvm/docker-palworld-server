# Palworld Server Helm Chart Values
# This is a YAML-formatted file.

# Number of replicas (only 1 supported for game server)
replicaCount: 1

image:
  repository: peozozo123/palworld-server
  tag: latest
  pullPolicy: Always

# Server configuration
server:
  name: "Palworld Server"
  password: ""
  maxPlayers: 32
  port: 8211
  description: "A Palworld dedicated server"
  publicPort: 8211
  publicIp: ""
  # Reference an existing Kubernetes Secret for ADMIN_PASSWORD.
  # The secret must have the key specified by adminPasswordKey.
  existingSecret: ""
  adminPasswordKey: "admin-password" 

# REST API configuration (port moved to managementService)
restApi:
  enabled: true

# RCON configuration (port moved to managementService)
rcon:
  enabled: true

# Monitoring
monitoring:
  mode: "both"
  metricsPort: 9090
  dashboardPort: 8080
  logLevel: "INFO"
  idleRestart:
    enabled: true
    minutes: 30
    mode: "restart"

# Backup configuration
backup:
  enabled: true
  interval: 3600
  retentionDays: 7

# Discord notifications (optional)
discord:
  enabled: false
  webhookUrl: ""

# Performance tuning
performance:
  useMultiThread: true
  usePerformanceThreads: true
  workerThreads: 0

# Resource requests and limits
resources:
  requests:
    memory: "4Gi"
    cpu: "2"
  limits:
    memory: "8Gi"
    cpu: "4"

# Persistent storage
persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  dataPath: /home/steam/palworld_server/Pal/Saved
  backupPath: /home/steam/backups
  logPath: /home/steam/logs

# Service configuration
#
# External-facing game/query service
service:
  type: LoadBalancer
  gamePort: 8211
  queryPort: 27015

# Management service (REST API + RCON)
# Disabled by default; enable only when external access is required.
# When disabled, no management Service is created — REST and RCON ports are not exposed at all.
managementService:
  enabled: false
  restApiPort: 8212
  rconPort: 25575
  type: ClusterIP

# Node selector (ARM64)
nodeSelector:
  kubernetes.io/arch: arm64

# Environment variables (additional)
extraEnv: []
#  - name: EXAMPLE_VAR
#    value: "example"

# Pod annotations
podAnnotations: {}

# Security context
securityContext:
  runAsUser: 1002
  runAsGroup: 1002
  fsGroup: 1002
