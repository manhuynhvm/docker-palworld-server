name: 🐳 Palworld Server Builder

on:
    # Daily automatic builds
    # schedule:
    #     - cron: "0 3 * * *"

    # Manual trigger with options
    workflow_dispatch:
        inputs:
            source_version:
                description: "Palworld Server source version (e.g., latest, v1.0, 1.0.0)"
                required: false
                default: "latest"
                type: string

            build_version:
                description: "Custom build version tag (optional - will use source version if empty)"
                required: false
                default: ""
                type: string

            verify_build:
                description: "Verify build functionality"
                required: false
                default: false
                type: boolean

            force_rebuild:
                description: "Force rebuild even if image exists"
                required: false
                default: false
                type: boolean

            clear_cache:
                description: "Clear build cache before building"
                required: false
                default: false
                type: boolean

# Optimized concurrency management
concurrency:
    group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}-${{ github.event.inputs.build_version || github.event.inputs.source_version || 'latest' }}
    cancel-in-progress: false

# Enhanced global environment variables
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    DOCKERHUB_REPO: supersunho/palworld-server
    DOCKER_BUILDKIT: 1
    BUILDKIT_PROGRESS: plain
    CACHE_VERSION: v1

# Default permissions
permissions:
    contents: read

##############################################################################
# 1) Prepare version and matrix
##############################################################################
jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            source_version: ${{ steps.get-version.outputs.source_version }}
            source_version_clean: ${{ steps.get-version.outputs.source_version_clean }}
            source_version_base: ${{ steps.get-version.outputs.source_version_base }}
            build_version: ${{ steps.get-version.outputs.build_version }}
            build_version_clean: ${{ steps.get-version.outputs.build_version_clean }}
            build_version_base: ${{ steps.get-version.outputs.build_version_base }}

        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v7

            - name: 🔍 Determine source and build versions
              id: get-version
              env:
                  SOURCE_VERSION_INPUT: ${{ github.event.inputs.source_version || '' }}
                  BUILD_VERSION_INPUT: ${{ github.event.inputs.build_version || '' }}
              run: |
                  # Use extracted, testable validator script
                  OUTPUT=$(scripts/validate_ci_versions.sh \
                    "$SOURCE_VERSION_INPUT" "$BUILD_VERSION_INPUT")

                  # Write each output line to GITHUB_OUTPUT
                  echo "$OUTPUT" | while IFS= read -r line; do
                    if [ -n "$line" ]; then
                      echo "$line" >> "$GITHUB_OUTPUT"
                    fi
                  done

                  # Parse for summary display
                  source_version=$(echo "$OUTPUT" | grep '^source_version=' | cut -d= -f2-)
                  source_version_clean=$(echo "$OUTPUT" | grep '^source_version_clean=' | cut -d= -f2-)
                  source_version_base=$(echo "$OUTPUT" | grep '^source_version_base=' | cut -d= -f2-)
                  build_version=$(echo "$OUTPUT" | grep '^build_version=' | cut -d= -f2-)
                  build_version_clean=$(echo "$OUTPUT" | grep '^build_version_clean=' | cut -d= -f2-)
                  build_version_base=$(echo "$OUTPUT" | grep '^build_version_base=' | cut -d= -f2-)

                  echo ""
                  echo "📋 Version Summary:"
                  echo "├─ 🎯 Palworld Server Source : $source_version ($source_version_clean)"
                  echo "├─ 🏷️ Build/Release Tag     : $build_version ($build_version_clean)"
                  echo "├─ 🔧 Source Base Version   : $source_version_base"
                  echo "└─ 🚀 Build Base Version    : $build_version_base"
                  echo ""
                  echo "✅ Version validation passed by scripts/validate_ci_versions.sh"

    ##############################################################################
    # 1.5) Run Python test suite
    ##############################################################################
    test:
        needs: prepare
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v7

            - name: 🐍 Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: 📦 Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio pytest-cov

            - name: 🧪 Run pytest suite with coverage gate
              id: test
              continue-on-error: false
              run: |
                  set -o pipefail
                  python -m pytest --cov=src --cov-report=term-missing --tb=short -q 2>&1 | tee pytest_output.txt
                  pytest_status=${PIPESTATUS[0]}
                  echo "status=$pytest_status" >> "$GITHUB_OUTPUT"
                  exit "$pytest_status"

            - name: 📊 Test and coverage summary
              run: |
                  echo "## 🧪 Test Results" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
                  grep -E '(passed|failed|error|warnings?|[0-9]+%)' "pytest_output.txt" 2>/dev/null | tail -20 >> "$GITHUB_STEP_SUMMARY" || echo "No test output" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"


    ##############################################################################
    # 1.75) Deployment validation (Helm/Compose/actionlint)
    ##############################################################################
    deploy-validate:
        needs: prepare
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v7

            - name: 🔧 Install Helm
              uses: azure/setup-helm@v4
              with:
                  version: "v3.16.3"

            - name: 📦 Install actionlint
              env:
                  ACTIONLINT_VERSION: "1.7.7"
                  # SHA-256 of the official download script for v1.7.7
                  # Regenerate on version bump: curl -sSfL "https://raw.githubusercontent.com/rhysd/actionlint/v{NEW}/scripts/download-actionlint.bash" | sha256sum
                  ACTIONLINT_INSTALLER_SHA256: "221d1d16c03e4e4fcd867de34104e8d479bdce20ccdfa553b9a5c0dc29bf6af2"
              run: |
                  curl -sSfL \
                    "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash" \
                    -o /tmp/install-actionlint.bash
                  # Verify installer script checksum before executing
                  echo "${ACTIONLINT_INSTALLER_SHA256}  /tmp/install-actionlint.bash" | sha256sum -c - || {
                    echo "❌ actionlint installer checksum mismatch" >&2
                    rm -f /tmp/install-actionlint.bash
                    exit 1
                  }
                  bash /tmp/install-actionlint.bash "${ACTIONLINT_VERSION}"
                  rm -f /tmp/install-actionlint.bash
                  ./actionlint -version
                  test -f ./actionlint || { echo "❌ actionlint download failed" >&2; exit 1; }

            - name: 🔍 actionlint — CI workflow syntax
              id: check-actionlint
              run: |
                  ./actionlint -no-color .github/workflows/build-and-deploy.yml 2>&1 || {
                    echo "❌ actionlint found issues" >&2
                    exit 1
                  }

            - name: 🔍 Helm lint — chart validity
              id: helm-lint
              run: |
                  helm lint charts/palworld-server \
                    --set server.existingSecret=ci-secret \
                    --set server.adminPasswordKey=admin-password 2>&1 || {
                    echo "❌ helm lint failed" >&2
                    exit 1
                  }

            - name: ✅ Helm template — Secret provided (positive)
              id: check-helm-template-positive
              run: |
                  helm template palworld charts/palworld-server \
                    --set server.existingSecret=test-secret \
                    --set server.adminPasswordKey=admin-password \
                    > /dev/null 2>&1 || {
                    echo "❌ helm template with Secret failed" >&2
                    exit 1
                  }
                  echo "✅ helm template with Secret succeeded"

            - name: ❌ Helm template — Secret MISSING (negative)
              id: check-helm-template-negative
              run: |
                  OUTPUT=$(helm template palworld charts/palworld-server 2>&1 || true)
                  if echo "$OUTPUT" | grep -qiE '(existingSecret.*required|required.*existingSecret)'; then
                    echo "✅ helm correctly rejected missing existingSecret"
                  else
                    echo "❌ helm did NOT reject missing existingSecret" >&2
                    echo "   Output: $OUTPUT" >&2
                    exit 1
                  fi

            - name: 🔍 Default Service — no REST/RCON ports
              id: check-default-service
              run: |
                  SERVICE_YAML=$(helm template palworld charts/palworld-server \
                    --set server.existingSecret=test-secret \
                    --set server.adminPasswordKey=admin-password 2>&1)
                  if echo "$SERVICE_YAML" | grep -qE 'kind: Service'; then
                    if echo "$SERVICE_YAML" | grep -A30 'kind: Service' | grep -v -- '-management' | grep -qE '(8212|25575)'; then
                      echo "❌ Default Service exposes management port (8212/25575)" >&2
                      exit 1
                    else
                      echo "✅ Default Service has no REST/RCON ports"
                    fi
                  else
                    echo "❌ Default Service not found in template" >&2
                    exit 1
                  fi

            - name: ✅ management Service — opt-in generates ClusterIP
              id: check-mgmt-service
              run: |
                  MGMT_YAML=$(helm template palworld charts/palworld-server \
                    --set server.existingSecret=test-secret \
                    --set server.adminPasswordKey=admin-password \
                    --set managementService.enabled=true 2>&1)
                  if echo "$MGMT_YAML" | grep -A10 'kind: Service' | grep -q -- '-management'; then
                    if echo "$MGMT_YAML" | grep -A10 'kind: Service' | grep -A5 -- '-management' | grep -q 'ClusterIP'; then
                      echo "✅ management ClusterIP Service created when enabled=true"
                    else
                      echo "❌ management Service is not ClusterIP" >&2
                      exit 1
                    fi
                  else
                    echo "❌ management Service not found in template output" >&2
                    exit 1
                  fi

            - name: 🔍 Docker Compose config — positive
              id: check-compose-positive
              run: |
                  trap 'rm -f .env' EXIT
                  # Create .env with all required vars for compose interpolation
                  cat > .env << 'EOF'
                  ADMIN_PASSWORD=ci-admin-pw
                  SERVER_NAME=ci-test
                  MAX_PLAYERS=16
                  SERVER_PORT=8211
                  REST_API_PORT=8212
                  EOF
                  ADMIN_PASSWORD=override-pw GRAFANA_ADMIN_PASSWORD=ci-graf-pw \
                    docker compose config > /dev/null 2>&1 || {
                    echo "❌ docker compose config (with secrets) failed" >&2
                    exit 1
                  }
                  echo "✅ docker compose config with secrets succeeded"
                  # Verify palworld-server env does NOT contain grafana secrets
                  CONFIG_JSON=$(ADMIN_PASSWORD=override-pw GRAFANA_ADMIN_PASSWORD=ci-graf-pw \
                    docker compose config 2>&1)
                  if echo "$CONFIG_JSON" | grep -qi 'GRAFANA_ADMIN_PASSWORD'; then
                    echo "❌ palworld-server env leaks GRAFANA_ADMIN_PASSWORD" >&2
                    exit 1
                  fi
                  echo "✅ palworld-server env does not contain grafana secrets"

            - name: ❌ Docker Compose config — ADMIN_PASSWORD missing (negative)
              id: check-compose-negative-admin
              run: |
                  trap 'rm -f .env' EXIT
                  cat > .env << 'EOF'
                  SERVER_NAME=ci-test
                  MAX_PLAYERS=16
                  SERVER_PORT=8211
                  REST_API_PORT=8212
                  EOF
                  if GRAFANA_ADMIN_PASSWORD=ci-graf-pw \
                    docker compose config > /dev/null 2>&1; then
                    echo "❌ compose config succeeded despite missing ADMIN_PASSWORD" >&2
                    exit 1
                  fi
                  OUTPUT=$(GRAFANA_ADMIN_PASSWORD=ci-graf-pw \
                    docker compose config 2>&1 || true)
                  if echo "$OUTPUT" | grep -qi 'ADMIN_PASSWORD'; then
                    echo "✅ compose correctly rejected missing ADMIN_PASSWORD"
                  else
                    echo "❌ compose did NOT reject missing ADMIN_PASSWORD" >&2
                    echo "   Output: $OUTPUT" >&2
                    exit 1
                  fi

            - name: ❌ Docker Compose config — GRAFANA_PW missing (negative)
              id: check-compose-negative-grafana
              run: |
                  trap 'rm -f .env' EXIT
                  cat > .env << 'EOF'
                  ADMIN_PASSWORD=ci-admin-pw
                  SERVER_NAME=ci-test
                  MAX_PLAYERS=16
                  SERVER_PORT=8211
                  REST_API_PORT=8212
                  EOF
                  if docker compose config > /dev/null 2>&1; then
                    echo "❌ compose config succeeded despite missing GRAFANA_ADMIN_PASSWORD" >&2
                    exit 1
                  fi
                  OUTPUT=$(docker compose config 2>&1 || true)
                  if echo "$OUTPUT" | grep -qi 'GRAFANA_ADMIN_PASSWORD'; then
                    echo "✅ compose correctly rejected missing GRAFANA_ADMIN_PASSWORD"
                  else
                    echo "❌ compose did NOT reject missing GRAFANA_ADMIN_PASSWORD" >&2
                    echo "   Output: $OUTPUT" >&2
                    exit 1
                  fi

            - name: 📊 Validation summary
              if: always()
              run: |
                  cat >> "$GITHUB_STEP_SUMMARY" << EOF
                  ## 🔍 Deployment Validation
                  - actionlint: \${{ steps.check-actionlint.outcome }}
                  - helm lint: \${{ steps.helm-lint.outcome }}
                  - helm template (Secret provided): \${{ steps.check-helm-template-positive.outcome }}
                  - helm template (Secret missing): \${{ steps.check-helm-template-negative.outcome }}
                  - Default Service port check: \${{ steps.check-default-service.outcome }}
                  - management Service opt-in: \${{ steps.check-mgmt-service.outcome }}
                  - docker compose config (secrets set): \${{ steps.check-compose-positive.outcome }}
                  - docker compose config (ADMIN_PASSWORD missing): \${{ steps.check-compose-negative-admin.outcome }}
                  - docker compose config (GRAFANA_PW missing): \${{ steps.check-compose-negative-grafana.outcome }}
                  EOF


    ##############################################################################
    # 2) Build ARM64 image
    ##############################################################################
    build:
        needs: [prepare, test, deploy-validate]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        env:
            BUILD_VERSION_BASE: ${{ needs.prepare.outputs.build_version_base }}
            SOURCE_VERSION_BASE: ${{ needs.prepare.outputs.source_version_base }}
        steps:
            - name: 🎯 Display build target information
              run: |
                  echo "🎯 Building Palworld Server container for: linux/arm64"
                  echo "📦 Palworld Server Source: ${{ env.SOURCE_VERSION_BASE }}"
                  echo "🏷️ Build Tag: ${{ env.BUILD_VERSION_BASE }}"

            - name: 🔍 Check existing images via registry API
              id: check-images
              run: |
                  IMAGE_TAG="${{ env.BUILD_VERSION_BASE }}-arm64"
                  echo "🔍 Checking if image exists: $IMAGE_TAG"

                  # Always build on workflow_dispatch with force_rebuild
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
                    echo "🔄 Force rebuild enabled via workflow_dispatch"
                    echo "build_image=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # Check GHCR for existing image
                  TOKEN="${{ secrets.GITHUB_TOKEN }}"
                  REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

                  echo "🔍 Checking GHCR for existing image..."
                  GHCR_RESPONSE=$(curl -s -H "Authorization: Bearer $TOKEN" \
                    "https://api.github.com/user/packages/container/$REPO_NAME/versions" 2>/dev/null || echo '[]')

                  if echo "$GHCR_RESPONSE" | jq -e --arg TAG "$IMAGE_TAG" '.[] | select(.metadata.container.tags[]? == $TAG)' >/dev/null 2>&1; then
                    echo "✅ Image $IMAGE_TAG already exists in GHCR"
                    if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
                      echo "🔄 Force rebuild enabled, proceeding anyway"
                      echo "build_image=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "⏭️ Skipping build (image exists, use force_rebuild to override)"
                      echo "build_image=false" >> "$GITHUB_OUTPUT"
                    fi
                  else
                    echo "❌ Image $IMAGE_TAG not found in GHCR, proceeding with build"
                    echo "build_image=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: 📥 Checkout repository
              if: steps.check-images.outputs.build_image == 'true'
              uses: actions/checkout@v7

            - name: 🛠️ Set up QEMU
              if: steps.check-images.outputs.build_image == 'true'
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: linux/arm64

            - name: 🛠️ Set up Docker Buildx
              if: steps.check-images.outputs.build_image == 'true'
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker-container
                  use: true

            - name: 🔑 Login to GHCR
              if: steps.check-images.outputs.build_image == 'true'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 🔑 Login to Docker Hub
              if: steps.check-images.outputs.build_image == 'true'
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: 📦 Initialize cache directories
              if: steps.check-images.outputs.build_image == 'true'
              run: |
                  mkdir -p /tmp/apt-cache /tmp/apt-lib
                  echo "📁 Cache directories initialized"

            - name: 💾 Cache build dependencies
              if: steps.check-images.outputs.build_image == 'true'
              uses: actions/cache@v4
              id: system-cache
              with:
                  path: |
                      /tmp/apt-cache
                      /tmp/apt-lib
                  key: ${{ env.CACHE_VERSION }}-palworld-cache-${{ runner.os }}-${{ runner.arch }}-arm64-${{ needs.prepare.outputs.build_version_base }}
                  restore-keys: |
                      ${{ env.CACHE_VERSION }}-palworld-cache-${{ runner.os }}-${{ runner.arch }}-arm64-

            - name: 🚀 Build and push (linux/arm64)
              if: steps.check-images.outputs.build_image == 'true'
              id: build
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: linux/arm64
                  push: true
                  no-cache: ${{ github.event.inputs.clear_cache == 'true' }}
                  cache-from: |
                      type=gha,scope=${{ env.CACHE_VERSION }}-palworld-arm64-${{ needs.prepare.outputs.build_version_base }}
                  cache-to: |
                      type=gha,mode=max,scope=${{ env.CACHE_VERSION }}-palworld-arm64-${{ needs.prepare.outputs.build_version_base }}
                  build-args: |
                      BUILDKIT_INLINE_CACHE=1
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.build_version_base }}-arm64
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
                      ${{ env.DOCKERHUB_REPO }}:${{ needs.prepare.outputs.build_version_base }}-arm64
                      ${{ env.DOCKERHUB_REPO }}:latest-arm64
                  provenance: false

            - name: 🧪 Comprehensive container verification
              if: steps.check-images.outputs.build_image == 'true' && github.event.inputs.verify_build == 'true'
              run: |
                  IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION_BASE }}-arm64"
                  echo "🔍 Starting verification suite for arm64..."

                  echo "📋 Test 1: Binary Verification"
                  docker run --rm --platform linux/arm64 --entrypoint "" "$IMAGE" ls /home/pal/palworld-server || echo " - ⚠️ Palworld server binary check completed"

                  echo "📋 Test 2: Health Check"
                  docker run --rm --platform linux/arm64 --entrypoint "" "$IMAGE" python3 /scripts/healthcheck.py --help >/dev/null \
                    && echo " - ✅ Health check command working" \
                    || echo " - ❌ Health check command failed"

                  echo "📋 Test 3: Server Manager"
                  docker run --rm --platform linux/arm64 --entrypoint "" "$IMAGE" python3 -c "import src.server_manager; print('Server manager import successful')" \
                    && echo " - ✅ Server manager import working" \
                    || echo " - ❌ Server manager import failed"

                  echo "📋 Test 4: Configuration"
                  docker run --rm --platform linux/arm64 --entrypoint "" "$IMAGE" ls /config/ || echo " - ⚠️ Config directory check completed"

                  echo "🎉 Verification completed for arm64!"

            - name: 📄 Export digest
              if: steps.check-images.outputs.build_image == 'true'
              run: |
                  mkdir -p /tmp/digests/arm64
                  echo "${{ steps.build.outputs.digest }}" > /tmp/digests/arm64/digest.txt
                  echo "📝 Digest saved for arm64"

            - name: 📤 Upload digest artifact
              if: steps.check-images.outputs.build_image == 'true'
              uses: actions/upload-artifact@v7
              with:
                  name: digests-arm64
                  path: /tmp/digests/arm64/digest.txt
                  retention-days: 1

            - name: 📊 Display cache utilization
              run: |
                  echo "📊 Cache Utilization Statistics:"
                  echo "🗂️ APT Cache: $(du -sh /tmp/apt-cache 2>/dev/null | cut -f1 || echo '0B')"
                  echo "🗂️ APT Lib: $(du -sh /tmp/apt-lib 2>/dev/null | cut -f1 || echo '0B')"
                  echo "💾 Cache Hit: ${{ steps.system-cache.outputs.cache-hit }}"

    ##############################################################################
    # 3) Create manifest for ARM64-only
    ##############################################################################
    create-manifest:
        needs: [prepare, build]
        if: always() && needs.build.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        env:
            BUILD_VERSION_BASE: ${{ needs.prepare.outputs.build_version_base }}
            SOURCE_VERSION_BASE: ${{ needs.prepare.outputs.source_version_base }}
        steps:
            - name: 📥 Download digest artifact
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: false

            - name: 🔍 Debug Check downloaded artifact
              run: |
                  echo "🔍 Debugging artifact download..."
                  echo "📁 Contents of /tmp/digests:"
                  ls -la /tmp/digests/ || echo "❌ /tmp/digests directory not found"

                  echo ""
                  echo "📂 Checking arm64 architecture directory:"
                  if [ -d "/tmp/digests/arm64" ]; then
                    echo "✅ arm64 directory exists"
                    if [ -f "/tmp/digests/digests-arm64/digest.txt" ]; then
                      echo "  📄 digest.txt exists: $(cat /tmp/digests/digests-arm64/digest.txt)"
                    else
                      echo "  ❌ digest.txt missing"
                    fi
                  else
                    echo "❌ arm64 directory not found"
                  fi

                  echo ""
                  echo "🗂️ All files in /tmp/digests:"
                  find /tmp/digests -type f 2>/dev/null || echo "No files found"

            - name: 🛠️ Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 🔑 Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 🔑 Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: 🏷️ Create ARM64-only manifests
              run: |
                  VERSION="${{ env.BUILD_VERSION_BASE }}"
                  echo "📦 Creating ARM64-only manifests..."
                  echo "🎯 Target version: $VERSION"

                  # Verify ARM64 image exists
                  if [ -f "/tmp/digests/digests-arm64/digest.txt" ]; then
                    echo "✅ Confirmed ARM64 image availability"
                  else
                    echo "❌ ARM64 image not found, cannot create manifests"
                    echo "🔍 This usually means:"
                    echo "   1. Build job was skipped due to existing images"
                    echo "   2. Force rebuild option should be enabled"
                    echo "   3. Digest artifacts were not properly uploaded"
                    exit 1
                  fi

                  # Create manifests for both registries
                  for registry in ghcr dockerhub; do
                    if [ "$registry" = "ghcr" ]; then
                      PREFIX="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                    else
                      PREFIX="${{ env.DOCKERHUB_REPO }}"
                    fi
                    
                    ARM64_IMAGE="${PREFIX}:${VERSION}-arm64"
                    LATEST_ARM64_IMAGE="${PREFIX}:latest-arm64"
                    
                    echo "🏗️ Creating version manifest: ${PREFIX}:${VERSION} -> ${ARM64_IMAGE}"
                    docker buildx imagetools create \
                      --tag ${PREFIX}:${VERSION} \
                      ${ARM64_IMAGE}
                    
                    echo "🏗️ Creating latest manifest: ${PREFIX}:latest -> ${LATEST_ARM64_IMAGE}"
                    docker buildx imagetools create \
                      --tag ${PREFIX}:latest \
                      ${LATEST_ARM64_IMAGE}
                    
                    echo "✅ ARM64-only manifests created for $registry"
                  done

    ##############################################################################
    # 4) Build summary
    ##############################################################################
    summary:
        needs: [prepare, build]
        runs-on: ubuntu-latest
        env:
            SOURCE_VERSION: ${{ needs.prepare.outputs.source_version }}
            SOURCE_VERSION_BASE: ${{ needs.prepare.outputs.source_version_base }}
            BUILD_VERSION_BASE: ${{ needs.prepare.outputs.build_version_base }}
        steps:
            - name: 📥 Download digest artifact
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: false

            - name: 📊 Generate comprehensive build summary for Palworld Server
              run: |
                  # Pre-calculate digest values and status
                  ARM64_DIGEST=$(cut -c1-12 /tmp/digests/digests-arm64/digest.txt 2>/dev/null || echo "N/A")
                  ARM64_STATUS=$([ -f /tmp/digests/digests-arm64/digest.txt ] && echo "✅ Success" || echo "❌ Failed")

                  BUILD_COUNT=$(find /tmp/digests -mindepth 1 -maxdepth 1 -type d -print 2>/dev/null | wc -l || echo "0")
                  BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')

                  # Write summary with pre-calculated values
                  cat >> "$GITHUB_STEP_SUMMARY" << EOF
                  # 🚀 Palworld Server ARM64 Build Summary

                  **Build Date**: $BUILD_DATE  
                  **Palworld Server Source Version**: ${{ env.SOURCE_VERSION_BASE }}  
                  **Build/Release Tag**: ${{ env.BUILD_VERSION_BASE }}  
                  **Source Release Tag**: ${{ env.SOURCE_VERSION }}  
                  **Build Number**: #${{ github.run_number }}  
                  **Repository**: [${{ github.repository }}](https://github.com/${{ github.repository }})  
                  **Workflow Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

                  ## 🏗️ ARM64 Build Results

                  ### 📦 Container Image Digests
                  | Architecture | Digest | Status |
                  |--------------|--------|--------|
                  | **arm64** | \`${ARM64_DIGEST}...\` | ${ARM64_STATUS} |

                  ### 🐳 Published Container Registries

                  #### 🎯 Docker Hub (Primary)
                  \`\`\`
                  # ARM64-specific image
                  docker pull ${{ env.DOCKERHUB_REPO }}:latest-arm64    # ARM64 only
                  docker pull ${{ env.DOCKERHUB_REPO }}:${{ env.BUILD_VERSION_BASE }}-arm64
                  \`\`\`

                  #### 🔄 GitHub Container Registry (GHCR)
                  \`\`\`
                  # ARM64-specific image
                  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
                  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION_BASE }}-arm64
                  \`\`\`

                  ## 🚀 Quick Start Commands (ARM64)

                  ### 🎯 Universal Usage (ARM64)
                  \`\`\`
                  # ARM64-specific container
                  docker run -it --rm ${{ env.DOCKERHUB_REPO }}:latest-arm64

                  # Check version (universal command)
                  docker run --rm ${{ env.DOCKERHUB_REPO }}:latest-arm64 python3 -c "import sys; print('Python version:', sys.version)"

                  # Get help (works on all platforms)
                  docker run --rm ${{ env.DOCKERHUB_REPO }}:latest-arm64 python3 /scripts/healthcheck.py --help
                  \`\`

                  ## 🎉 Enhanced Features

                  ✅ **ARM64 Optimized**: Single architecture for ARM64 platforms  
                  ✅ **Dual Registry**: Available on Docker Hub and GHCR  
                  ✅ **Version Control**: Separate source and build version management  

                  **🎉 Palworld Server ARM64 build completed successfully!**  
                  **📊 Total Architectures Built**: $BUILD_COUNT  
                  **🚀 Platform**: ARM64 optimized  

                  *Build metadata: [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) • Build #${{ github.run_number }}*
                  EOF

    ##############################################################################
    # 5) Create GitHub Release
    ##############################################################################
    create-release:
        needs: [prepare, create-manifest, summary]
        if: always() && needs.create-manifest.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
            BUILD_VERSION_BASE: ${{ needs.prepare.outputs.build_version_base }}
            SOURCE_VERSION: ${{ needs.prepare.outputs.source_version }}
            SOURCE_VERSION_BASE: ${{ needs.prepare.outputs.source_version_base }}
        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0 # Fetch all history for commit history
            - name: 🕐 Set current date
              run: echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"
            - name: 📝 Generate release notes with categorized commit history
              id: release-notes
              run: |
                  # Get the newest semver release tag before the current release.
                  # Non-release tags (for example, latest) are ignored.
                  PREV_TAG=$(scripts/find_previous_release_tag.sh "${{ env.BUILD_VERSION }}")

                  if [ -z "$PREV_TAG" ]; then
                    echo "🔍 No previous tag found, using initial commit"
                    PREV_TAG=$(git rev-list --max-parents=0 HEAD)
                  else
                    echo "🔍 Previous tag found: $PREV_TAG"
                  fi

                  echo "📋 Fetching commits from $PREV_TAG to HEAD"

                  # Initialize categorized commit lists
                  FEATURES=""
                  BUG_FIXES=""
                  DOCS=""
                  PERF=""
                  REFACTOR=""
                  MAINTENANCE=""
                  OTHERS=""

                  # Get commits and categorize them
                  while IFS= read -r line; do
                    if [ -n "$line" ]; then
                      COMMIT_HASH=$(echo "$line" | cut -d'|' -f1)
                      COMMIT_SUBJECT=$(echo "$line" | cut -d'|' -f2-)
                      
                      # Categorize commits based on conventional commit prefixes
                      if [[ $COMMIT_SUBJECT =~ ^feat(\(.+\))?:[[:space:]]* ]]; then
                        FEATURES="${FEATURES}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      elif [[ $COMMIT_SUBJECT =~ ^fix(\(.+\))?:[[:space:]]* ]]; then
                        BUG_FIXES="${BUG_FIXES}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      elif [[ $COMMIT_SUBJECT =~ ^docs(\(.+\))?:[[:space:]]* ]]; then
                        DOCS="${DOCS}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      elif [[ $COMMIT_SUBJECT =~ ^perf(\(.+\))?:[[:space:]]* ]]; then
                        PERF="${PERF}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      elif [[ $COMMIT_SUBJECT =~ ^refactor(\(.+\))?:[[:space:]]* ]]; then
                        REFACTOR="${REFACTOR}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      elif [[ $COMMIT_SUBJECT =~ ^(chore|build|ci|style|test)(\(.+\))?:[[:space:]]* ]]; then
                        MAINTENANCE="${MAINTENANCE}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      else
                        OTHERS="${OTHERS}- ${COMMIT_SUBJECT} (${COMMIT_HASH})"$'\n'
                      fi
                    fi
                  done < <(git log --oneline "${PREV_TAG}..HEAD" --pretty=format:"%h|%s" | sort -k2)

                  # Create release notes body with categorized commits
                  RELEASE_NOTES="# 🚀 Palworld Server ARM64 Release ${{ env.BUILD_VERSION }}

                  **Build Date**: ${{ env.BUILD_DATE }}  
                  **Palworld Server Source Version**: ${{ env.SOURCE_VERSION_BASE }}  
                  **Build/Release Version**: ${{ env.BUILD_VERSION_BASE }}  
                  **Platform**: ARM64 optimized  
                  **Build Workflow**: #${{ github.run_number }}

                  ## 📋 Changelog

                  "

                  # Add categorized sections to release notes
                  if [ -n "$FEATURES" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### 🚀 Features
                  ${FEATURES}

                  "
                  fi

                  if [ -n "$BUG_FIXES" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### 🐛 Bug Fixes
                  ${BUG_FIXES}

                  "
                  fi

                  if [ -n "$PERF" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### 🏎️ Performance
                  ${PERF}

                  "
                  fi

                  if [ -n "$REFACTOR" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### ♻️ Refactoring
                  ${REFACTOR}

                  "
                  fi

                  if [ -n "$DOCS" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### 📝 Documentation
                  ${DOCS}

                  "
                  fi

                  if [ -n "$MAINTENANCE" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### 🔧 Maintenance
                  ${MAINTENANCE}

                  "
                  fi

                  if [ -n "$OTHERS" ]; then
                    RELEASE_NOTES="${RELEASE_NOTES}### 🔄 Other Changes
                  ${OTHERS}

                  "
                  fi

                  # Export release notes to GitHub output
                  {
                    echo "body<<EOF"
                    printf '%s\n' "$RELEASE_NOTES"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: 🏷️ Create Git tag via API
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG_NAME="${{ env.BUILD_VERSION }}"
                  if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
                    echo "⚠️ Tag $TAG_NAME already exists, skipping creation"
                  else
                    echo "🏷️ Creating tag via GitHub API: $TAG_NAME"
                    git tag "$TAG_NAME"
                    gh api "repos/${{ github.repository }}/git/refs" -f "ref=refs/tags/$TAG_NAME" -f "sha=$(git rev-parse HEAD)"
                  fi

            - name: 🏷️ Create comprehensive GitHub Release for Palworld Server
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.BUILD_VERSION }}
                  name: "Palworld Server ARM64 Release ${{ env.BUILD_VERSION }} (Build #${{ github.run_number }})"
                  body: ${{ steps.release-notes.outputs.body }}
                  files: /tmp/digests/*/digest.txt
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
